spring.application.name=Edifika-Microservice-IAM


spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/funda}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=${PORT:8081}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.edifika.iam.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

jwt.secret=edifika-secret-key-must-be-at-least-32-characters-long
jwt.expiration.days=7